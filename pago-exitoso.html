  <script>
    (function () {
      function safeParse(raw) {
        try { return JSON.parse(raw); } catch (_) { return null; }
      }
      function emitPurchaseFallback() {
        var ref = '';
        try {
          var params = new URLSearchParams(window.location.search || '');
          ref = params.get('ref') || sessionStorage.getItem('nb_purchase_ref') || '';
        } catch (_) {}
        if (!ref || typeof nbGa4EcomEvent !== 'function') return;
        var dedupeKey = 'nb_purchase_sent_ref_' + ref;
        try {
          if (sessionStorage.getItem(dedupeKey) === '1') return;
        } catch (_) {}
        var cart = [];
        try {
          cart = safeParse(localStorage.getItem('naturalbe_cart') || '[]') || [];
        } catch (_) {}
        var items = Array.isArray(cart) ? cart.map(function (item) {
          return {
            item_id: item.id,
            item_name: item.name,
            item_category: item.category || null,
            price: Number(item.price || 0),
            quantity: Number(item.quantity || 1)
          };
        }) : [];
        var total = items.reduce(function (sum, item) {
          return sum + (Number(item.price || 0) * Number(item.quantity || 1));
        }, 0);
        nbGa4EcomEvent('purchase', items, total, {
          transaction_id: String(ref),
          payment_type: 'wompi'
        });
        try {
          sessionStorage.setItem(dedupeKey, '1');
          localStorage.removeItem('naturalbe_cart');
        } catch (_) {}
      }
      window.addEventListener('load', function () {
        setTimeout(emitPurchaseFallback, 300);
      }, { once: true });
    })();
  </script>
  <script>
    (function initCrossSell() {
      var grid = document.getElementById('crossSellGrid');
      if (!grid) return;

      function formatCOP(val) {
        return new Intl.NumberFormat('es-CO', {
          style: 'currency',
          currency: 'COP',
          maximumFractionDigits: 0
        }).format(Number(val || 0));
      }

      function getLastCategory() {
        try {
          var cart = JSON.parse(localStorage.getItem('naturalbe_cart_backup') || '[]');
          if (Array.isArray(cart) && cart.length && cart[0].category) return cart[0].category;
        } catch (_) {}
        return '';
      }

      var version = '2026-02-25-prosa-makeup';
      fetch('/static/data/productos.json?v=' + encodeURIComponent(version))
        .then(function (r) { return r.ok ? r.json() : []; })
        .then(function (products) {
          if (!Array.isArray(products) || !products.length) return;
          var cat = getLastCategory();
          var pool = cat ? products.filter(function (p) { return p.categoria === cat; }) : products;
          if (pool.length < 3) pool = products;
          pool = pool.sort(function () { return Math.random() - 0.5; }).slice(0, 3);

          grid.innerHTML = pool.map(function (p) {
            var price = p.precio_oferta || p.precio || 0;
            var slug = p.slug || '';
            var img = p.imagen_principal_webp || p.imagen_principal || '/static/img/placeholder.webp';
            var name = String(p.nombre || '').replace(/</g, '&lt;');
            return '<a href="/producto/' + encodeURIComponent(slug) + '" style="display:block;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1rem;text-decoration:none;color:#0f172a;">' +
              '<img src="' + img + '" alt="' + name + '" style="width:100%;aspect-ratio:1;object-fit:contain;border-radius:8px;margin-bottom:0.6rem;" loading="lazy">' +
              '<div style="font-weight:600;font-size:0.93rem;margin-bottom:0.3rem;">' + name + '</div>' +
              '<div style="color:#0b6e4f;font-weight:700;">' + formatCOP(price) + '</div>' +
              '</a>';
          }).join('');
        })
        .catch(function () {});
    })();
  </script>
